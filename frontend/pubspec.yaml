name: loft
description: Content-to-Customer mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking
  dio: ^5.4.0
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.0
  
  # UI
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  timeago: ^3.6.1
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Routing
  go_router: ^13.0.0
  
  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  
  # Protobuf (will be generated)
  protobuf: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  
  # App Config
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#000000"
  image: assets/icons/splash_icon.png
  android: true
  ios: true
