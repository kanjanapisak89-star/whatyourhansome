services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loft
      POSTGRES_PASSWORD: loft
      POSTGRES_DB: loft
    ports:
      - "5432:5432"
    volumes:
      - loft_pg:/var/lib/postgresql/data
      - ./backend/migrations/000001_initial.up.sql:/docker-entrypoint-initdb.d/01_loft.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loft -d loft"]
      interval: 3s
      timeout: 5s
      retries: 5

  loft-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://loft:loft@postgres:5432/loft?sslmode=disable
      PORT: "8080"
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}

volumes:
  loft_pg:
